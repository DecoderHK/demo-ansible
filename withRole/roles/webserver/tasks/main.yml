---

- name: Install nginx
  package:
    name: nginx
    state: present

- name: Deploy nginx site config
  template:
    src: site.conf.j2
    dest: /etc/nginx/conf.d/site.conf
  notify: restart nginx

- name: Validate nginx configuration
  block:
    - name: Run nginx -t
      command: nginx -t
      register: nginx_test
      changed_when: false

  rescue:
    - name: nginx validation failed
      debug:
        msg: "nginx -t failed on {{ inventory_hostname }}"

  always:
    - name: nginx validation completed
      debug:
        msg: "nginx validation completed on {{ inventory_hostname }}"

- name: Deploy index page
  template:
    src: index.html.j2
    dest: /usr/share/nginx/html/index.html

- name: Ensure nginx is enabled and started
  service:
    name: nginx
    state: started
    enabled: true

- name: Show deployment variables
  debug:
    msg: "Deploying {{ app_name }} on {{ inventory_hostname }} (app_port={{ app_port }})"
